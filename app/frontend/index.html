<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CE-CSL 数据集受限手语识别原型</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <p class="eyebrow">GROUP 11 - DATASET-BOUNDED RESEARCH PROTOTYPE</p>
        <h1>CE-CSL 数据集受限手语识别</h1>
        <p class="lead">
          上传或录制一段短视频。系统以 CE-CSL 数据集中的 gloss/token
          范围为识别边界，展示预测标签、置信度、延迟和受限中文重构结果。
        </p>
        <div id="system-status" class="status">正在检查模型状态...</div>
      </header>

      <section class="panel">
        <div class="video-frame">
          <video id="preview" autoplay muted playsinline></video>
        </div>
        <div class="controls">
          <button id="camera-button" type="button">开启摄像头</button>
          <button id="record-button" type="button" disabled>录制 3 秒</button>
          <label class="file-button">
            选择视频
            <input id="file-input" type="file" accept="video/*" />
          </label>
        </div>
        <p id="selection" class="muted">尚未选择视频。</p>
      </section>

      <section class="panel result-panel" aria-live="polite">
        <div class="result-heading">
          <h2>识别结果</h2>
          <span id="result-status" class="badge">等待输入</span>
        </div>
        <p id="result-text" class="result-text">完成录制或选择视频后开始。</p>
        <dl class="details">
          <div><dt>Label</dt><dd id="result-label">-</dd></div>
          <div><dt>Gloss Tokens</dt><dd id="result-gloss-tokens">-</dd></div>
          <div><dt>Confidence</dt><dd id="result-confidence">-</dd></div>
          <div><dt>Latency</dt><dd id="result-latency">-</dd></div>
          <div><dt>Model</dt><dd id="result-model">-</dd></div>
          <div><dt>Score Type</dt><dd id="result-score-type">-</dd></div>
          <div><dt>Chinese Reconstruction</dt><dd id="result-semantic-status">-</dd></div>
        </dl>
        <ul id="warnings" class="warnings"></ul>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
